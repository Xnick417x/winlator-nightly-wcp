name: Build Box64 Bionic Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: '14 3 * * *'

permissions:
  contents: write

jobs:
  build-bionic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: ptitSeb/box64
          path: source
          fetch-depth: 0

      - name: Check for Updates
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd source
          SHORT_HASH=$(git rev-parse --short HEAD)
          echo "UPSTREAM_HASH=$(git rev-parse HEAD)" >> $GITHUB_ENV
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "SHOULD_BUILD=true" >> $GITHUB_ENV
          else
            if gh release list --repo ${{ github.repository }} --limit 100 | grep -q -- "-$SHORT_HASH"; then
              echo "SHOULD_BUILD=false" >> $GITHUB_ENV
            else
              echo "SHOULD_BUILD=true" >> $GITHUB_ENV
            fi
          fi

      - name: Install Dependencies
        if: env.SHOULD_BUILD == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake make python3 p7zip-full wget tar file unzip xz-utils ccache

      - name: Cache Android NDK
        if: env.SHOULD_BUILD == 'true'
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: android-ndk-r26b
          key: ndk-r26b

      - name: Setup Android NDK
        if: env.SHOULD_BUILD == 'true' && steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
          unzip -q android-ndk-r26b-linux.zip
          rm android-ndk-r26b-linux.zip

      - name: Set NDK Environment
        if: env.SHOULD_BUILD == 'true'
        run: |
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r26b" >> $GITHUB_ENV
          echo "BOX64_COMPILER=$PWD/android-ndk-r26b/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang" >> $GITHUB_ENV

      - name: Setup ccache
        if: env.SHOULD_BUILD == 'true'
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-box64-bionic-${{ env.UPSTREAM_HASH }}
          restore-keys: |
            ccache-box64-bionic-

      - name: Configure ccache
        if: env.SHOULD_BUILD == 'true'
        run: |
          mkdir -p .ccache
          echo "CCACHE_DIR=$PWD/.ccache" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=500M" >> $GITHUB_ENV

      - name: Get Version Info
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd source
          MAJOR=$(grep '#define BOX64_MAJOR' src/box64version.h | awk '{print $3}')
          MINOR=$(grep '#define BOX64_MINOR' src/box64version.h | awk '{print $3}')
          REVISION=$(grep '#define BOX64_REVISION' src/box64version.h | awk '{print $3}')
          VERSION="$MAJOR.$MINOR.$REVISION"
          COMMIT=$(git rev-parse --short HEAD)
          echo "FULL_VERSION=${VERSION}-${COMMIT}-bionic" >> $GITHUB_ENV
          echo "COMMIT_HASH=${COMMIT}" >> $GITHUB_ENV

      - name: Apply Local Controller Fix Patch
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd source
          wget -q "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/patch/pipetto-controller-fix.patch" -O my-patch.patch
          patch -p1 < my-patch.patch || true

      - name: Configure and Build
        if: env.SHOULD_BUILD == 'true'
        run: |
          mkdir build
          cd build
          cmake ../source \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER=${{ env.BOX64_COMPILER }} \
            -DANDROID=1 \
            -DBIONIC=1 \
            -DARM_DYNAREC=1 \
            -DBAD_SIGNAL=1 \
            -DTERMUX=0 \
            -DHAVE_TRACE=0 \
            -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          ${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip box64

      - name: Show ccache stats
        if: env.SHOULD_BUILD == 'true'
        run: ccache -s

      - name: Package
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd build
          cat <<EOF > profile.json
          {
            "type": "Box64",
            "versionName": "${{ env.FULL_VERSION }}",
            "versionCode": 0,
            "description": "Box64 Bionic Nightly\nCommit: ${{ env.COMMIT_HASH }}",
            "files": [
              {
                "source": "box64",
                "target": "\${bindir}/box64"
              }
            ]
          }
          EOF
          tar -cJf "bionic-box64-${{ env.FULL_VERSION }}.wcp" box64 profile.json

      - name: Upload Artifact
        if: env.SHOULD_BUILD == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Box64-Bionic
          path: build/bionic-box64-*.wcp
          compression-level: 0

      - name: Create Release
        if: env.SHOULD_BUILD == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: bionic-box64-nightly-${{ env.COMMIT_HASH }}
          files: build/bionic-box64-*.wcp
          name: "Box64 Bionic Nightly ${{ env.COMMIT_HASH }}"
          body: |
            Automated nightly build of Box64 (Bionic Optimized).
            Commit: https://github.com/ptitSeb/box64/commit/${{ env.COMMIT_HASH }}

      - name: Cleanup Old Releases
        if: env.SHOULD_BUILD == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[].tagName | select(startswith("bionic-box64-nightly-"))' \
          | tail -n +9 \
          | xargs -I {} sh -c 'gh release delete "{}" --cleanup-tag -y'

      - name: Checkout Dashboard
        if: env.SHOULD_BUILD == 'true'
        uses: actions/checkout@v4
        with:
          path: dashboard
          fetch-depth: 0

      - name: Push README Updates
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd dashboard
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/bionic-box64-nightly-${{ env.COMMIT_HASH }}/bionic-box64-${{ env.FULL_VERSION }}.wcp"
          BRANCH_NAME="${{ github.ref_name }}"
          git checkout $BRANCH_NAME 2>/dev/null || git checkout -b $BRANCH_NAME
          n=0
          until [ "$n" -ge 5 ]
          do
             git pull origin $BRANCH_NAME --rebase
             sed -i "/\*\*Box64\*\* (Non standard - wip)/ s|\[\*\*Download Latest\*\*\]([^)]*)|[**Download Latest**]($DOWNLOAD_URL)|" README.md
             git add README.md
             git commit -m "Update dashboard for Box64 Bionic ${{ env.COMMIT_HASH }} [skip ci]" || echo "Nothing to commit"
             if git push origin $BRANCH_NAME; then exit 0; fi
             n=$((n+1))
             sleep 15
          done
          exit 1

name: Build Nightly Turnip Drivers

on:
  schedule:
    - cron: '14 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      commit_hash: ${{ steps.check.outputs.commit_hash }}
      mesa_version: ${{ steps.check.outputs.mesa_version }}
    steps:
      - name: Check Upstream Mesa
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_HASH=$(git ls-remote https://gitlab.freedesktop.org/mesa/mesa HEAD | awk '{print $1}' | cut -c1-7)
          MESA_VERSION=$(curl -s https://gitlab.freedesktop.org/mesa/mesa/-/raw/main/VERSION | sed 's/-devel.*//' | tr -d '[:space:]')
          
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "mesa_version=$MESA_VERSION" >> $GITHUB_OUTPUT
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            if gh release list --repo ${{ github.repository }} --limit 100 | grep -q -- "-$COMMIT_HASH"; then
              echo "should_build=false" >> $GITHUB_OUTPUT
            else
              echo "should_build=true" >> $GITHUB_OUTPUT
            fi
          fi

  build-turnip:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: a6xx-a7xx
            suffix: ""
            extra_patch: ""
            extra_script: "patch/tu-fix.py"
          - variant: a8xx
            suffix: "-A8xx"
            extra_patch: "patch/tu8_kgsl_26.patch"
            extra_script: "patch/tu-fix.py:patch/fix_a8xx_dev_info.py:patch/apply_a8xx_gpus.py"
    env:
      COMMIT_HASH: ${{ needs.check-upstream.outputs.commit_hash }}
      MESA_VERSION: ${{ needs.check-upstream.outputs.mesa_version }}
      VERSION_NAME: Turnip-${{ needs.check-upstream.outputs.mesa_version }}-${{ needs.check-upstream.outputs.commit_hash }}${{ matrix.suffix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build patchelf unzip flex bison git perl python3-pip glslang-tools curl zip patch jq
          pip3 install --break-system-packages meson mako

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: turnip_workdir/android-ndk-r29
          key: ndk-r29-extracted

      - name: Prep and Build
        run: |
          chmod +x patch/build_turnip.sh
          
          if [ "${{ steps.cache-ndk.outputs.cache-hit }}" == "true" ]; then
            sed -i 's/curl -sL https:\/\/dl.google.com.*//g' patch/build_turnip.sh
            sed -i 's/unzip -q "$ndkver"-linux.zip.*//g' patch/build_turnip.sh
          fi
          
          export BUILD_VERSION="${{ github.run_number }}"
          [[ -n "${{ matrix.extra_patch }}" ]] && export EXTRA_PATCH="${{ matrix.extra_patch }}"
          [[ -n "${{ matrix.extra_script }}" ]] && export EXTRA_SCRIPT="${{ matrix.extra_script }}"
          
          sed -i 's/"name": "Mesa Turnip.*/"name": "Mesa Turnip ${{ env.MESA_VERSION }}-${{ env.COMMIT_HASH }}${{ matrix.suffix }}",/g' patch/build_turnip.sh
          
          ./patch/build_turnip.sh
          
          SRC=$(ls turnip_workdir/mesa-turnip-*.zip | head -1)
          mv "$SRC" "turnip_workdir/${VERSION_NAME}.zip"

      - name: Upload driver ZIP
        uses: actions/upload-artifact@v4
        with:
          name: turnip-${{ matrix.variant }}
          path: turnip_workdir/${{ env.VERSION_NAME }}.zip

  release-turnip:
    needs: [check-upstream, build-turnip]
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    env:
      COMMIT_HASH: ${{ needs.check-upstream.outputs.commit_hash }}
      MESA_VERSION: ${{ needs.check-upstream.outputs.mesa_version }}
      BASE_NAME: Turnip-${{ needs.check-upstream.outputs.mesa_version }}-${{ needs.check-upstream.outputs.commit_hash }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download driver ZIPs
        uses: actions/download-artifact@v4
        with:
          pattern: turnip-*
          merge-multiple: true
          path: ./zips

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly-${{ env.BASE_NAME }}
          name: nightly-${{ env.BASE_NAME }}
          body: |
            Automated nightly build of Turnip drivers. Includes standard and A8xx experimental variants.
            Commit: https://gitlab.freedesktop.org/mesa/mesa/-/commit/${{ env.COMMIT_HASH }}
          files: zips/*.zip

      - name: Cleanup Old Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OLD_RELEASES=$(gh release list --limit 500 --json tagName,createdAt --jq '[.[] | select(.tagName | startswith("nightly-Turnip-"))] | sort_by(.createdAt) | reverse | .[].tagName' | tail -n +9)
          
          for TAG in $OLD_RELEASES; do
            echo "Deleting old release: $TAG"
            gh release delete "$TAG" --cleanup-tag -y || true
            sleep 2
          done

      - name: Push README Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          REGULAR_URL="https://github.com/${{ github.repository }}/releases/download/nightly-${{ env.BASE_NAME }}/${{ env.BASE_NAME }}.zip"
          A8XX_URL="https://github.com/${{ github.repository }}/releases/download/nightly-${{ env.BASE_NAME }}/${{ env.BASE_NAME }}-A8xx.zip"
          BRANCH_NAME="${{ github.ref_name }}"
          
          git checkout $BRANCH_NAME 2>/dev/null || git checkout -b $BRANCH_NAME
          
          n=0
          until [ "$n" -ge 5 ]
          do
             git pull origin $BRANCH_NAME --rebase
             sed -i "/\*\*Turnip\*\* (a6xx\/a7xx)/ s|\[\*\*Download Latest\*\*\]([^)]*)|[**Download Latest**]($REGULAR_URL)|" README.md
             sed -i "/\*\*Turnip\*\* (a8xx-experimental)/ s|\[\*\*Download Latest\*\*\]([^)]*)|[**Download Latest**]($A8XX_URL)|" README.md
             
             git add README.md
             git commit -m "Update dashboard for Turnip Nightly ${{ env.COMMIT_HASH }} [skip ci]" || echo "Nothing to commit"
             if git push origin $BRANCH_NAME; then exit 0; fi
             n=$((n+1))
             sleep 15
          done
          exit 1
